server:
  port: 8081
spring:
  application:
    name: apricity-gateway
  security:
    oauth2:
      # for jwt token validation
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/haze-org
      # for user login, will remove once frontend is created
      client:
        registration:
          keycloak:
            client-id: haze-org-client
            client-secret: ${KEYCLOAK_CLIENT_SECRET}
            scope: openid, profile, email
            authorization-grant-type: authorization_code
            # This is where Keycloak sends the user back after login
            redirect-uri: "{baseUrl}/login/oauth2/code/keycloak"
        provider:
          keycloak:
            issuer-uri: http://localhost:8080/realms/haze-org
            user-name-attribute: preferred_username